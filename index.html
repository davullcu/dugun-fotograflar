<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Gurbet & Ünal — 10 Temmuz 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal:    #1a5c85;
      --teal-lt: #2e7aa8;
      --sky1:    #a8d0e8;
      --sky2:    #c8e4f2;
      --sky3:    #e0f0f8;
      --cream:   #f8f4ee;
      --gold:    #b09468;
      --rose:    #7aafcc;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: var(--teal);
      background: var(--cream);
      overflow-x: hidden;
      min-height: 100svh;
    }

    /* ── HERO ─────────────────────────────────── */
    #hero {
      position: relative;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: linear-gradient(180deg,
        var(--sky1) 0%, var(--sky2) 45%, var(--sky3) 75%, #f0ece8 100%);
    }

    /* ── TÜL SÜTUNLAR ─────────────────────────── */
    .page-columns {
      position: fixed; inset: 0; pointer-events: none; z-index: 50;
      display: flex; justify-content: space-between;
    }
    .col-side { width: clamp(36px, 6vw, 64px); position: relative; flex-shrink: 0; overflow: hidden; }
    .col-side svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .col-side.col-right svg { transform: scaleX(-1); }

    #birds { position: absolute; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
    .bird { position: absolute; animation: bird-fly linear infinite; will-change: transform; }
    @keyframes bird-fly {
      0%   { transform: translateX(-15vw) translateY(0); opacity: 0; }
      6%   { opacity: 1; } 94% { opacity: 1; }
      100% { transform: translateX(115vw) translateY(var(--dy)); opacity: 0; }
    }
    .wing-left  { animation: flap-left  var(--flap) ease-in-out infinite alternate; transform-origin: 50% 50%; }
    .wing-right { animation: flap-right var(--flap) ease-in-out infinite alternate; transform-origin: 50% 50%; }
    @keyframes flap-left  { from { transform: rotate(-8deg) scaleY(1); } to { transform: rotate(-28deg) scaleY(0.55); } }
    @keyframes flap-right { from { transform: rotate(8deg)  scaleY(1); } to { transform: rotate(28deg)  scaleY(0.55); } }

    .hero-top {
      position: relative; z-index: 2;
      text-align: center; padding: 60px 24px 24px;
    }
    .couple-names {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(64px, 14vw, 100px);
      color: var(--teal); line-height: 1.1;
    }
    .evleniyoruz {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300; font-size: clamp(12px, 2.5vw, 14px);
      letter-spacing: 0.35em; color: var(--teal-lt); margin-top: 6px;
    }
    .hero-date {
      margin-top: 12px;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(17px, 3.5vw, 22px); font-weight: 300;
      color: var(--teal-lt); letter-spacing: 0.1em;
    }

    .divider {
      width: 50px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 20px auto;
    }

    /* ── KARTLAR ──────────────────────────────── */
    .cards-wrap {
      position: relative; z-index: 2;
      padding: 0 20px 60px;
      width: 100%; max-width: 480px;
      display: flex; flex-direction: column; gap: 14px;
    }

    .card {
      display: block;
      background: rgba(255,255,255,0.80);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(31,58,66,0.14);
      border-radius: 20px;
      padding: 22px 24px;
      text-decoration: none;
      color: var(--teal);
      transition: transform 0.18s, box-shadow 0.18s, background 0.18s;
      cursor: pointer;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 10px 32px rgba(31,58,66,0.13); background: rgba(255,255,255,0.92); }
    .card.disabled { opacity: 0.55; cursor: not-allowed; pointer-events: none; }

    .card-inner { display: flex; align-items: center; gap: 16px; }
    .card-icon { font-size: 32px; flex-shrink: 0; }
    .card-body { flex: 1; text-align: left; }
    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(20px, 5vw, 26px); font-weight: 400; color: var(--teal);
    }
    .card-desc {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300; font-size: 13px; color: var(--teal-lt);
      letter-spacing: 0.05em; margin-top: 4px; line-height: 1.5;
    }
    .card-arrow {
      font-size: 20px; color: var(--gold); flex-shrink: 0;
      transition: transform 0.18s;
    }
    .card:hover .card-arrow { transform: translateX(4px); }

    .card-badge {
      display: inline-block; margin-top: 8px;
      padding: 4px 12px; border-radius: 100px;
      font-family: 'Montserrat', sans-serif;
      font-size: 12px; font-weight: 400; letter-spacing: 0.08em;
    }
    .badge-soon { background: rgba(31,58,66,0.08); color: var(--teal-lt); }
    .badge-open { background: rgba(46,165,110,0.12); color: #2e7d32; }
  </style>
</head>
<body>

<!-- Tül sütunlar -->
<div class="page-columns" aria-hidden="true">
  <div class="col-side col-left">
    <svg viewBox="0 0 64 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="tul-l" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="rgba(255,255,255,0.70)"/>
          <stop offset="60%" stop-color="rgba(255,255,255,0.25)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0.0)"/>
        </linearGradient>
      </defs>
      <rect x="0" y="0" width="64" height="800" fill="url(#tul-l)"/>
      <line x1="60" y1="0" x2="60" y2="800" stroke="rgba(181,149,106,0.28)" stroke-width="1"/>
      <g opacity="0.18" fill="#1a5c85">
        <ellipse cx="18" cy="80"  rx="9" ry="18" transform="rotate(-20,18,80)"/>
        <ellipse cx="28" cy="120" rx="6" ry="14" transform="rotate(15,28,120)"/>
        <ellipse cx="12" cy="200" rx="8" ry="16" transform="rotate(-30,12,200)"/>
        <ellipse cx="30" cy="280" rx="5" ry="12" transform="rotate(25,30,280)"/>
        <ellipse cx="20" cy="360" rx="9" ry="18" transform="rotate(-15,20,360)"/>
        <ellipse cx="14" cy="460" rx="8" ry="16" transform="rotate(20,14,460)"/>
        <ellipse cx="26" cy="560" rx="6" ry="13" transform="rotate(-20,26,560)"/>
        <ellipse cx="18" cy="660" rx="7" ry="15" transform="rotate(15,18,660)"/>
        <circle cx="22" cy="150" r="4"/> <circle cx="28" cy="330" r="3"/>
        <circle cx="16" cy="510" r="4"/> <circle cx="22" cy="700" r="3"/>
      </g>
    </svg>
  </div>
  <div class="col-side col-right">
    <svg viewBox="0 0 64 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="tul-r" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="rgba(255,255,255,0.0)"/>
          <stop offset="40%" stop-color="rgba(255,255,255,0.25)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0.70)"/>
        </linearGradient>
      </defs>
      <rect x="0" y="0" width="64" height="800" fill="url(#tul-r)"/>
      <line x1="4" y1="0" x2="4" y2="800" stroke="rgba(181,149,106,0.28)" stroke-width="1"/>
      <g opacity="0.18" fill="#1a5c85">
        <ellipse cx="46" cy="80"  rx="9" ry="18" transform="rotate(20,46,80)"/>
        <ellipse cx="36" cy="120" rx="6" ry="14" transform="rotate(-15,36,120)"/>
        <ellipse cx="52" cy="200" rx="8" ry="16" transform="rotate(30,52,200)"/>
        <ellipse cx="34" cy="280" rx="5" ry="12" transform="rotate(-25,34,280)"/>
        <ellipse cx="44" cy="360" rx="9" ry="18" transform="rotate(15,44,360)"/>
        <ellipse cx="50" cy="460" rx="8" ry="16" transform="rotate(-20,50,460)"/>
        <ellipse cx="38" cy="560" rx="6" ry="13" transform="rotate(20,38,560)"/>
        <ellipse cx="46" cy="660" rx="7" ry="15" transform="rotate(-15,46,660)"/>
        <circle cx="42" cy="150" r="4"/> <circle cx="36" cy="330" r="3"/>
        <circle cx="48" cy="510" r="4"/> <circle cx="42" cy="700" r="3"/>
      </g>
    </svg>
  </div>
</div>

<section id="hero">
  <div id="birds"></div>

  <div class="hero-top">
    <h1 class="couple-names">Gurbet ve Ünal</h1>
    <p class="evleniyoruz">E V L E N İ Y O R U Z</p>
    <p class="hero-date">10 Temmuz 2026 · Cuma · 19:00</p>
    <div class="divider"></div>
  </div>

  <div class="cards-wrap">

    <a href="katilim.html" class="card">
      <div class="card-inner">
        <span class="card-icon">✉️</span>
        <div class="card-body">
          <p class="card-title">Düğün Katılım Formu</p>
          <p class="card-desc">Katılımınızı bize bildirin</p>
        </div>
        <span class="card-arrow">›</span>
      </div>
    </a>

    <a href="davetiye.html" class="card">
      <div class="card-inner">
        <span class="card-icon">💌</span>
        <div class="card-body">
          <p class="card-title">Davetiye</p>
          <p class="card-desc">Tüm detaylar, konum ve geri sayım</p>
        </div>
        <span class="card-arrow">›</span>
      </div>
    </a>

    <div class="card" id="photo-card">
      <div class="card-inner">
        <span class="card-icon">📷</span>
        <div class="card-body">
          <p class="card-title">Fotoğraf Paylaş</p>
          <p class="card-desc">Çektiğiniz anları bizimle paylaşın</p>
          <span class="card-badge badge-soon" id="photo-badge">— Düğün başladığında aktif olacak</span>
        </div>
        <span class="card-arrow" id="photo-arrow" style="opacity:0.3">›</span>
      </div>
    </div>

  </div>
</section>

<script>
/* ─── Gerçekçi Martılar ──────────────────────────────────────── */
(function() {
  const ns = 'http://www.w3.org/2000/svg';
  const container = document.getElementById('birds');
  function makeBird(size, opacity, flapDur) {
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('width', size * 2.8); svg.setAttribute('height', size);
    svg.setAttribute('viewBox', '0 0 100 36'); svg.style.overflow = 'visible';
    const lg = document.createElementNS(ns, 'g');
    lg.classList.add('wing-left'); lg.style.setProperty('--flap', flapDur+'s'); lg.style.transformOrigin = '50px 18px';
    const lp = document.createElementNS(ns, 'path');
    lp.setAttribute('d', 'M50,18 Q32,4 8,12 Q18,16 30,16 Q40,17 50,18Z');
    lp.setAttribute('fill', `rgba(230,235,225,${opacity})`); lp.setAttribute('stroke', `rgba(160,175,160,${opacity*0.4})`); lp.setAttribute('stroke-width','0.4');
    lg.appendChild(lp);
    const rg = document.createElementNS(ns, 'g');
    rg.classList.add('wing-right'); rg.style.setProperty('--flap', flapDur+'s'); rg.style.transformOrigin = '50px 18px';
    const rp = document.createElementNS(ns, 'path');
    rp.setAttribute('d', 'M50,18 Q68,4 92,12 Q82,16 70,16 Q60,17 50,18Z');
    rp.setAttribute('fill', `rgba(230,235,225,${opacity})`); rp.setAttribute('stroke', `rgba(160,175,160,${opacity*0.4})`); rp.setAttribute('stroke-width','0.4');
    rg.appendChild(rp);
    const body = document.createElementNS(ns, 'ellipse');
    body.setAttribute('cx','52'); body.setAttribute('cy','18'); body.setAttribute('rx','8'); body.setAttribute('ry','3.5');
    body.setAttribute('fill', `rgba(242,242,238,${opacity})`);
    const head = document.createElementNS(ns, 'ellipse');
    head.setAttribute('cx','60'); head.setAttribute('cy','15'); head.setAttribute('rx','4.5'); head.setAttribute('ry','3');
    head.setAttribute('fill', `rgba(242,242,238,${opacity})`);
    const beak = document.createElementNS(ns, 'path');
    beak.setAttribute('d','M63.5,14.5 L69,15.5 L63.5,16.5Z'); beak.setAttribute('fill',`rgba(190,155,90,${opacity})`);
    const tail = document.createElementNS(ns, 'path');
    tail.setAttribute('d','M44,20 Q47,27 50,23 Q53,27 56,20'); tail.setAttribute('fill',`rgba(225,228,222,${opacity*0.85})`);
    svg.appendChild(tail); svg.appendChild(lg); svg.appendChild(rg); svg.appendChild(body); svg.appendChild(head); svg.appendChild(beak);
    return svg;
  }
  for (let i = 0; i < 16; i++) {
    const size = 14 + Math.random() * 20, top = 5 + Math.random() * 65;
    const dur = 9 + Math.random() * 14, dy = (Math.random()-.5)*60, delay = -Math.random()*dur;
    const opacity = 0.55 + Math.random() * 0.35, flapDur = 0.28 + Math.random() * 0.22;
    const wrap = document.createElement('div'); wrap.className = 'bird';
    wrap.style.cssText = `top:${top}%;left:0;--dy:${dy}px;animation-duration:${dur}s;animation-delay:${delay}s`;
    wrap.appendChild(makeBird(size, opacity, flapDur)); container.appendChild(wrap);
  }
})();

/* ─── Fotoğraf kartı aktiflik kontrolü ───────────────────────── */
(function() {
  const unlock = new Date('2026-07-10T19:00:00');
  const card   = document.getElementById('photo-card');
  const badge  = document.getElementById('photo-badge');
  const arrow  = document.getElementById('photo-arrow');

  function check() {
    if (Date.now() >= unlock.getTime()) {
      card.style.cursor  = 'pointer';
      card.style.opacity = '1';
      card.style.pointerEvents = 'auto';
      card.onclick = () => { window.location.href = 'fotograf.html'; };
      badge.textContent = 'Aktif';
      badge.className   = 'card-badge badge-open';
      arrow.style.opacity = '1';
    } else {
      // Kalan süreyi badge'e yaz
      const diff  = unlock - Date.now();
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000)  / 60000);
      badge.textContent = d > 0
        ? `${d} gün ${h} saat sonra aktif`
        : h > 0
          ? `${h} saat ${m} dakika sonra aktif`
          : `${m} dakika sonra aktif`;
    }
  }

  check();
  setInterval(check, 30000); // her 30 sn güncelle
})();
</script>
</body>
</html>
