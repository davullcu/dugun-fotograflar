<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Katılım Formu — Gurbet & Ünal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal:    #1a5c85;
      --teal-lt: #2e7aa8;
      --sky1:    #a8d0e8;
      --sky2:    #c8e4f2;
      --sky3:    #e0f0f8;
      --cream:   #f8f4ee;
      --gold:    #b09468;
      --rose:    #7aafcc;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: var(--teal);
      min-height: 100svh;
      background: linear-gradient(180deg, var(--sky1) 0%, var(--sky2) 40%, var(--sky3) 70%, #f0ece8 100%);
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 20px 60px;
      position: relative; overflow-x: hidden;
    }

    /* ── TÜL SÜTUNLAR ─────────────────────────── */
    .page-columns {
      position: fixed; inset: 0; pointer-events: none; z-index: 50;
      display: flex; justify-content: space-between;
    }
    .col-side { width: clamp(36px, 6vw, 64px); position: relative; flex-shrink: 0; overflow: hidden; }
    .col-side svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .col-side.col-right svg { transform: scaleX(-1); }

    #birds { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .bird { position: absolute; animation: bird-fly linear infinite; will-change: transform; }
    @keyframes bird-fly {
      0%   { transform: translateX(-15vw) translateY(0); opacity: 0; }
      6%   { opacity: 1; } 94% { opacity: 1; }
      100% { transform: translateX(115vw) translateY(var(--dy)); opacity: 0; }
    }
    .wing-left  { animation: flap-left  var(--flap) ease-in-out infinite alternate; transform-origin: 50% 50%; }
    .wing-right { animation: flap-right var(--flap) ease-in-out infinite alternate; transform-origin: 50% 50%; }
    @keyframes flap-left  { from { transform: rotate(-8deg) scaleY(1); } to { transform: rotate(-28deg) scaleY(0.55); } }
    @keyframes flap-right { from { transform: rotate(8deg)  scaleY(1); } to { transform: rotate(28deg)  scaleY(0.55); } }

    .page-content { position: relative; z-index: 1; width: 100%; max-width: 480px; }

    .page-header { text-align: center; margin-bottom: 32px; }
    .page-names { font-family: 'Great Vibes', cursive; font-size: clamp(54px, 12vw, 76px); color: var(--teal); line-height: 1.1; }
    .page-sub { font-family: 'Montserrat', sans-serif; font-weight: 300; font-size: 13px; letter-spacing: 0.3em; color: var(--teal-lt); margin-top: 6px; }
    .divider { width: 50px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 16px auto; }

    /* ── FORM KARTI ───────────────────────────── */
    .form-card {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(31,58,66,0.13);
      border-radius: 24px; padding: 36px 28px;
      box-shadow: 0 8px 40px rgba(31,58,66,0.10);
    }
    .form-card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(22px, 5vw, 28px); font-weight: 400;
      color: var(--teal); margin-bottom: 6px; text-align: center;
    }
    .form-card-desc {
      font-family: 'Montserrat', sans-serif; font-weight: 300;
      font-size: 12px; color: var(--teal-lt); letter-spacing: 0.05em;
      text-align: center; margin-bottom: 28px; line-height: 1.6;
    }

    .field { margin-bottom: 18px; }
    .field label {
      display: block; font-family: 'Montserrat', sans-serif;
      font-weight: 300; font-size: 13px; letter-spacing: 0.12em;
      color: var(--teal-lt); margin-bottom: 7px;
    }
    .field input[type="text"],
    .field input[type="number"],
    .field textarea,
    .field select {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid rgba(31,58,66,0.2); border-radius: 12px;
      font-family: 'Cormorant Garamond', serif; font-size: 17px;
      color: var(--teal); background: white; outline: none;
      transition: border-color 0.2s; appearance: none;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--teal); }
    .field textarea { resize: vertical; min-height: 90px; font-size: 16px; }
    .field input[type="number"] { -moz-appearance: textfield; }
    .field input[type="number"]::-webkit-inner-spin-button { display: none; }

    /* Radyo butonları */
    .radio-group { display: flex; gap: 10px; }
    .radio-opt { flex: 1; }
    .radio-opt input[type="radio"] { display: none; }
    .radio-opt label {
      display: flex; align-items: center; justify-content: center;
      padding: 11px 8px;
      border: 1.5px solid rgba(31,58,66,0.2); border-radius: 12px;
      font-family: 'Cormorant Garamond', serif; font-size: 16px;
      color: var(--teal-lt); cursor: pointer;
      transition: all 0.18s; text-align: center; gap: 6px;
    }
    .radio-opt input[type="radio"]:checked + label {
      border-color: var(--teal); background: var(--teal); color: white;
    }

    /* Gönder butonu */
    #submit-btn {
      width: 100%; margin-top: 8px; padding: 14px;
      background: var(--teal); color: white; border: none; border-radius: 12px;
      font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 300;
      letter-spacing: 0.15em; cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    #submit-btn:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
    #submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Başarı */
    #success-msg {
      display: none; text-align: center; padding: 28px 20px;
    }
    .success-icon { font-size: 48px; margin-bottom: 12px; }
    .success-title { font-family: 'Great Vibes', cursive; font-size: 42px; color: var(--teal); margin-bottom: 8px; }
    .success-text { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 18px; color: var(--teal-lt); line-height: 1.7; }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 24px; font-family: 'Montserrat', sans-serif;
      font-size: 11px; font-weight: 300; letter-spacing: 0.15em;
      color: var(--teal-lt); text-decoration: none;
    }
    .back-link:hover { color: var(--teal); }
  </style>
</head>
<body>
<!-- Tül sütunlar -->
<div class="page-columns" aria-hidden="true">
  <div class="col-side col-left">
    <svg viewBox="0 0 64 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="tul-l" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="rgba(255,255,255,0.70)"/>
          <stop offset="60%" stop-color="rgba(255,255,255,0.25)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0.0)"/>
        </linearGradient>
      </defs>
      <rect x="0" y="0" width="64" height="800" fill="url(#tul-l)"/>
      <line x1="60" y1="0" x2="60" y2="800" stroke="rgba(181,149,106,0.28)" stroke-width="1"/>
      <g opacity="0.15" fill="#1a5c85">
        <ellipse cx="18" cy="80"  rx="9" ry="18" transform="rotate(-20,18,80)"/>
        <ellipse cx="28" cy="200" rx="6" ry="14" transform="rotate(15,28,200)"/>
        <ellipse cx="12" cy="350" rx="8" ry="16" transform="rotate(-30,12,350)"/>
        <ellipse cx="20" cy="500" rx="9" ry="18" transform="rotate(-15,20,500)"/>
        <ellipse cx="26" cy="650" rx="6" ry="13" transform="rotate(20,26,650)"/>
        <circle cx="22" cy="140" r="4"/> <circle cx="16" cy="430" r="3"/> <circle cx="22" cy="720" r="4"/>
      </g>
    </svg>
  </div>
  <div class="col-side col-right">
    <svg viewBox="0 0 64 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="tul-r" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="rgba(255,255,255,0.0)"/>
          <stop offset="40%" stop-color="rgba(255,255,255,0.25)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0.70)"/>
        </linearGradient>
      </defs>
      <rect x="0" y="0" width="64" height="800" fill="url(#tul-r)"/>
      <line x1="4" y1="0" x2="4" y2="800" stroke="rgba(181,149,106,0.28)" stroke-width="1"/>
      <g opacity="0.15" fill="#1a5c85">
        <ellipse cx="46" cy="80"  rx="9" ry="18" transform="rotate(20,46,80)"/>
        <ellipse cx="36" cy="200" rx="6" ry="14" transform="rotate(-15,36,200)"/>
        <ellipse cx="52" cy="350" rx="8" ry="16" transform="rotate(30,52,350)"/>
        <ellipse cx="44" cy="500" rx="9" ry="18" transform="rotate(15,44,500)"/>
        <ellipse cx="38" cy="650" rx="6" ry="13" transform="rotate(-20,38,650)"/>
        <circle cx="42" cy="140" r="4"/> <circle cx="48" cy="430" r="3"/> <circle cx="42" cy="720" r="4"/>
      </g>
    </svg>
  </div>
</div>

<div id="birds"></div>

<div class="page-content">
  <div class="page-header">
    <p class="page-names">Gurbet ve Ünal</p>
    <p class="page-sub">10 TEMMUZ 2026 · CUMA · 19:00</p>
    <div class="divider"></div>
  </div>

  <div class="form-card">
    <p class="form-card-title">Katılım Formu</p>
    <p class="form-card-desc">Düğünümüze katılıp katılamayacağınızı bize bildirin,<br>planlamamıza yardımcı olun.</p>

    <div id="form-wrap">
      <form name="katilim" data-netlify="true" netlify-honeypot="bot-field" id="rsvp-form" novalidate>
        <input type="hidden" name="form-name" value="katilim" />
        <p style="display:none"><input name="bot-field" /></p>

        <div class="field">
          <label>AD SOYAD</label>
          <input type="text" name="ad_soyad" placeholder="Adınızı girin" required />
        </div>

        <div class="field">
          <label>DÜĞÜNE KATILACAK MISINIZ?</label>
          <div class="radio-group">
            <div class="radio-opt">
              <input type="radio" name="katilim" id="evet" value="Evet, katılacağım" required />
              <label for="evet">✓ Evet, katılacağım</label>
            </div>
            <div class="radio-opt">
              <input type="radio" name="katilim" id="hayir" value="Hayır, katılamayacağım" />
              <label for="hayir">✗ Katılamayacağım</label>
            </div>
          </div>
        </div>

        <div class="field" id="kisi-field">
          <label>KAÇ KİŞİ OLACAKSINIZ? (kendiniz dahil)</label>
          <input type="number" name="kisi_sayisi" min="1" max="20" placeholder="1" value="1" />
        </div>

        <div class="field">
          <label>NOT (opsiyonel)</label>
          <textarea name="not" placeholder="Varsa bir notunuzu bırakın..."></textarea>
        </div>

        <button type="submit" id="submit-btn">Gönder</button>
      </form>
    </div>

    <div id="success-msg">
      <div class="success-icon">🌸</div>
      <p class="success-title">Teşekkürler!</p>
      <p class="success-text">Yanıtınız iletildi.<br>Sizi görmekten çok mutlu olacağız.</p>
    </div>
  </div>

  <div style="text-align:center">
    <a href="index.html" class="back-link">‹ Ana Menü</a>
  </div>
</div>

<script>
/* ─── Gerçekçi Martılar ──────────────────────────────────────── */
(function() {
  const ns = 'http://www.w3.org/2000/svg';
  const container = document.getElementById('birds');
  function makeBird(size, opacity, flapDur) {
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('width', size * 2.8); svg.setAttribute('height', size);
    svg.setAttribute('viewBox', '0 0 100 36'); svg.style.overflow = 'visible';
    const lg = document.createElementNS(ns, 'g');
    lg.classList.add('wing-left'); lg.style.setProperty('--flap', flapDur+'s'); lg.style.transformOrigin = '50px 18px';
    const lp = document.createElementNS(ns, 'path');
    lp.setAttribute('d', 'M50,18 Q32,4 8,12 Q18,16 30,16 Q40,17 50,18Z');
    lp.setAttribute('fill', `rgba(230,235,225,${opacity})`); lp.setAttribute('stroke', `rgba(160,175,160,${opacity*0.4})`); lp.setAttribute('stroke-width','0.4');
    lg.appendChild(lp);
    const rg = document.createElementNS(ns, 'g');
    rg.classList.add('wing-right'); rg.style.setProperty('--flap', flapDur+'s'); rg.style.transformOrigin = '50px 18px';
    const rp = document.createElementNS(ns, 'path');
    rp.setAttribute('d', 'M50,18 Q68,4 92,12 Q82,16 70,16 Q60,17 50,18Z');
    rp.setAttribute('fill', `rgba(230,235,225,${opacity})`); rp.setAttribute('stroke', `rgba(160,175,160,${opacity*0.4})`); rp.setAttribute('stroke-width','0.4');
    rg.appendChild(rp);
    const body = document.createElementNS(ns, 'ellipse');
    body.setAttribute('cx','52'); body.setAttribute('cy','18'); body.setAttribute('rx','8'); body.setAttribute('ry','3.5');
    body.setAttribute('fill', `rgba(242,242,238,${opacity})`);
    const head = document.createElementNS(ns, 'ellipse');
    head.setAttribute('cx','60'); head.setAttribute('cy','15'); head.setAttribute('rx','4.5'); head.setAttribute('ry','3');
    head.setAttribute('fill', `rgba(242,242,238,${opacity})`);
    const beak = document.createElementNS(ns, 'path');
    beak.setAttribute('d','M63.5,14.5 L69,15.5 L63.5,16.5Z'); beak.setAttribute('fill',`rgba(190,155,90,${opacity})`);
    const tail = document.createElementNS(ns, 'path');
    tail.setAttribute('d','M44,20 Q47,27 50,23 Q53,27 56,20'); tail.setAttribute('fill',`rgba(225,228,222,${opacity*0.85})`);
    svg.appendChild(tail); svg.appendChild(lg); svg.appendChild(rg); svg.appendChild(body); svg.appendChild(head); svg.appendChild(beak);
    return svg;
  }
  for (let i = 0; i < 14; i++) {
    const size = 12 + Math.random() * 18, top = 3 + Math.random() * 60;
    const dur = 9 + Math.random() * 13, dy = (Math.random()-.5)*50, delay = -Math.random()*dur;
    const opacity = 0.5 + Math.random() * 0.4, flapDur = 0.28 + Math.random() * 0.22;
    const wrap = document.createElement('div'); wrap.className = 'bird';
    wrap.style.cssText = `top:${top}%;left:0;--dy:${dy}px;animation-duration:${dur}s;animation-delay:${delay}s`;
    wrap.appendChild(makeBird(size, opacity, flapDur)); container.appendChild(wrap);
  }
})();

/* ─── Katılım seçeneğine göre kişi alanını gizle/göster ─────── */
document.querySelectorAll('input[name="katilim"]').forEach(r => {
  r.addEventListener('change', () => {
    document.getElementById('kisi-field').style.display =
      r.value === 'Evet, katılacağım' ? 'block' : 'none';
  });
});

/* ─── Form gönder ────────────────────────────────────────────── */
document.getElementById('rsvp-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const btn  = document.getElementById('submit-btn');

  // Basit doğrulama
  const ad = form.ad_soyad.value.trim();
  const kat = form.katilim.value;
  if (!ad) { alert('Lütfen adınızı girin.'); return; }
  if (!kat) { alert('Lütfen katılım durumunuzu seçin.'); return; }

  btn.disabled = true; btn.textContent = 'Gönderiliyor…';

  try {
    const body = new URLSearchParams(new FormData(form));
    const res  = await fetch('/katilim.html', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body });
    if (res.ok) {
      document.getElementById('form-wrap').style.display   = 'none';
      document.getElementById('success-msg').style.display = 'block';
    } else {
      throw new Error(res.status);
    }
  } catch {
    btn.disabled = false; btn.textContent = 'Gönder';
    alert('Bir hata oluştu. Lütfen tekrar deneyin.');
  }
});
</script>
</body>
</html>
